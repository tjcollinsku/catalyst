<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalyst — {% block title %}{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    nav { border-bottom: 1px solid #ddd; padding-bottom: .75rem; margin-bottom: 1.5rem; }
    nav a { margin-right: 1.25rem; text-decoration: none; color: #1d4ed8; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    h2 { font-size: 1.2rem; margin: 1.5rem 0 .5rem; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid #e5e7eb; }
    th { background: #f9fafb; font-weight: 600; }
    .btn { display: inline-block; padding: .45rem 1rem; background: #1d4ed8; color: #fff; border-radius: 4px; text-decoration: none; font-size: .9rem; border: none; cursor: pointer; }
    .btn:hover { background: #1e40af; }
    .btn-sm { padding: .3rem .7rem; font-size: .8rem; }
    label { display: block; margin-top: .75rem; font-weight: 500; font-size: .9rem; }
    input, select, textarea { display: block; width: 100%; box-sizing: border-box; padding: .4rem .6rem; margin-top: .25rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: .9rem; }
    .errorlist { color: #dc2626; font-size: .85rem; margin: .25rem 0 0; padding-left: 1rem; }
    .meta { color: #6b7280; font-size: .85rem; }
    .badge { display: inline-block; padding: .15rem .5rem; border-radius: 9999px; font-size: .75rem; font-weight: 600; background: #e5e7eb; }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-paused { background: #fef9c3; color: #854d0e; }
    .badge-closed { background: #f3f4f6; color: #6b7280; }
    .badge-referred { background: #dbeafe; color: #1e40af; }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'case_list' %}">Cases</a>
    <a href="{% url 'case_create' %}">+ New Case</a>
    <a href="{% url 'document_upload' %}">+ Upload Document</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
