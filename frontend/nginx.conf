# nginx.conf for serving Vite/React SPA + reverse proxy to Django API
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy API requests to the Django backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support large file uploads (bulk document upload)
        client_max_body_size 100M;

        # Long timeouts for OCR processing
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA fallback — serve index.html for all non-API, non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
