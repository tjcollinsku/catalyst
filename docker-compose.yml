# docker-compose.yml — Catalyst local development environment
#
# HOW TO USE:
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Logs:    docker compose logs db
#   Shell:   docker compose exec db psql -U catalyst_user -d catalyst_db

services:

  # ---------------------------------------------------------------------------
  # db — PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: catalyst_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: catalyst_db
      POSTGRES_USER: catalyst_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - catalyst_pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalyst_user -d catalyst_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # backend — Django API server
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: catalyst_backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: catalyst_db
      POSTGRES_USER: catalyst_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CATALYST_REQUIRE_AUTH: ${CATALYST_REQUIRE_AUTH:-False}
      CATALYST_API_TOKENS: ${CATALYST_API_TOKENS:-}
      CHROMA_PATH: /chroma_data
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - chromadb_data:/chroma_data
      # Bind-mount source for fast dev iteration. The Dockerfile still
      # COPYs the code at build time (so prod images are self-contained),
      # but locally this lets code edits hit the container without a rebuild.
      - ./backend:/app
    ports:
      - "8000:8000"

  # ---------------------------------------------------------------------------
  # qcluster — Django-Q2 worker (pulls async jobs off the Postgres broker)
  # ---------------------------------------------------------------------------
  qcluster:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: catalyst_qcluster
    restart: unless-stopped
    command: python manage.py qcluster
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: catalyst_db
      POSTGRES_USER: catalyst_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CATALYST_REQUIRE_AUTH: ${CATALYST_REQUIRE_AUTH:-False}
      CATALYST_API_TOKENS: ${CATALYST_API_TOKENS:-}
      CHROMA_PATH: /chroma_data
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - chromadb_data:/chroma_data
      - ./backend:/app

  # ---------------------------------------------------------------------------
  # frontend — Nginx serving React SPA + reverse proxy to backend API
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: catalyst_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  catalyst_pgdata:
  chromadb_data:
